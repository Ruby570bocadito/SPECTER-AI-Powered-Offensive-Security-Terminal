name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/specter/ || true
      - name: Test
        run: pytest tests/test_sandbox.py tests/test_guardrails.py -v || true
      - name: Type check
        run: mypy src/specter/ --ignore-missing-imports || true
