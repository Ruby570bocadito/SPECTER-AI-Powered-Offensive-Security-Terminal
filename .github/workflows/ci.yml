name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install rich typer pydantic pydantic-settings structlog python-dotenv click prompt_toolkit
          pip install pytest pytest-asyncio ruff mypy
          pip install -e .
      - name: Lint
        run: ruff check src/specter/
      - name: Test
        run: pytest tests/test_sandbox.py tests/test_guardrails.py -v
      - name: Type check
        run: mypy src/specter/ --ignore-missing-imports 2>&1 | head -100 || true
