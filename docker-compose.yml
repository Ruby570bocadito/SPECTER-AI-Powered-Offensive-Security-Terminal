# SPECTER + Ollama local
# docker compose up -d
# docker compose exec specter python -m specter.cli.main

services:
  ollama:
    image: ollama/ollama:latest
    container_name: specter-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  specter:
    build: .
    container_name: specter
    depends_on:
      - ollama
    environment:
      - SPECTER_OLLAMA_HOST=http://ollama:11434
      - SPECTER_DATA_DIR=/app
    volumes:
      - specter_sessions:/app/sessions
      - specter_output:/app/output
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    networks:
      - specter_net
    # For pentesting tasks requiring host network access, use:
    # docker compose run --rm --network host specter bash

volumes:
  ollama_data:
  specter_sessions:
  specter_output:

networks:
  specter_net:
    driver: bridge
