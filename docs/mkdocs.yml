site_name: SPECTER Documentation
site_description: AI-Powered Offensive Security Terminal
site_author: SPECTER Team
site_url: https://specter-ai.dev

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Arquitectura:
    - Overview: arquitectura/overview.md
    - Engine: arquitectura/engine.md
    - Skills: arquitectura/skills.md
    - MCP: arquitectura/mcp.md
    - Workflows: arquitectura/workflows.md
  - Guía:
    - Instalación: guia/instalacion.md
    - Configuración: guia/configuracion.md
    - Comandos: guia/comandos.md
  - API:
    - Core: api/core.md
    - Skills: api/skills.md
    - CLI: api/cli.md
  - Habilidades:
    - Recon: habilidades/recon.md
    - OSINT: habilidades/osint.md
    - Web: habilidades/web.md
    - Post-Explotación: habilidades/postex.md
    - Forense: habilidades/forense.md
    - Active Directory: habilidades/ad.md
    - Report: habilidades/report.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/specter-ai/specter
  generator: false

repo_url: https://github.com/specter-ai/specter
repo_name: specter-ai/specter
edit_uri: ""