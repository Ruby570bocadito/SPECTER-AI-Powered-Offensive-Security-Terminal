name: "osint_full"
description: "OSINT completo para un objetivo"
steps:
  - skill: osint
    action: whois
    params:
      domain: "{{target}}"
  - skill: osint
    action: dns_enum
    params:
      domain: "{{target}}"
  - skill: osint
    action: subdomain_enum
    params:
      domain: "{{target}}"